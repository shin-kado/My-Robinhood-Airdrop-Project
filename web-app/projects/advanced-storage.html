<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Web3 Storage Dashboard - Interactive Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/web3@1.8.1/dist/web3.min.js"></script>
    <style>
        :root { --primary: #2196f3; --success: #00e676; --pending: #ffc107; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); width: 580px; }
        .header { border-bottom: 2px solid #eee; margin-bottom: 25px; padding-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        
        /* 基本のカードスタイル */
        .item-card { 
            background: #fff; 
            border: 2px solid #eee; 
            padding: 18px; 
            border-radius: 16px; 
            position: relative; 
            transition: all 0.3s ease; 
        }

        /* 🔄 書き込み中（Updateボタン押下後）の状態 */
        .card-pending {
            border-color: var(--pending) !important;
            background: #fffdf7;
            opacity: 0.8;
        }

        /* 🔥 完了時のネオンアニメーション */
        .flash-neon {
            animation: neon-glow 1.5s ease-out forwards;
            z-index: 10;
        }
        @keyframes neon-glow {
            0% { box-shadow: 0 0 0px var(--success); transform: scale(1.05); border-color: var(--success); }
            30% { box-shadow: 0 0 25px var(--success); border-color: var(--success); }
            100% { box-shadow: 0 0 0px var(--success); transform: scale(1); border-color: var(--success); }
        }

        .label { font-size: 0.7em; color: #aaa; font-weight: 800; letter-spacing: 1px; margin-bottom: 8px; }
        .display-val { font-size: 1.2em; font-weight: bold; margin-bottom: 12px; color: #222; min-height: 1.4em; word-break: break-all; }
        input { width: 100%; padding: 10px; border: 2px solid #eee; border-radius: 10px; margin-bottom: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-write { background: #333; color: white; }
        .btn-write:disabled { background: #eee; color: #aaa; cursor: not-allowed; }
        #log { margin-top: 25px; padding: 15px; background: #1a1a1a; color: #ddd; font-family: monospace; font-size: 0.85em; border-radius: 12px; height: 120px; overflow-y: auto; }
        .log-ev { color: var(--success); }
        .log-sys { color: var(--primary); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div>
            <h2 style="margin:0;">Storage Dashboard</h2>
            <p id="walletInfo" style="font-size: 0.7em; color: #888;">Not Connected</p>
        </div>
        <button id="connectBtn" style="background:#f6851b; color:white; width:auto; padding: 10px 20px; border-radius: 12px;">Connect</button>
    </div>

    <div class="grid">
        <div class="item-card" id="card-AnyNumber">
            <div class="label">ANY NUMBER</div>
            <div id="anyNumberVal" class="display-val">--</div>
            <input type="number" id="anyNumberInput" placeholder="New Value">
            <button class="btn-write" onclick="updateData('setAnyNumber', 'anyNumberInput')" disabled>Update</button>
        </div>
        <div class="item-card" id="card-AnyText">
            <div class="label">ANY TEXT</div>
            <div id="anyTextVal" class="display-val">--</div>
            <input type="text" id="anyTextInput" placeholder="New Message">
            <button class="btn-write" onclick="updateData('setAnyText', 'anyTextInput')" disabled>Update</button>
        </div>
        <div class="item-card" id="card-OwnerNumber">
            <div class="label">OWNER NUMBER</div>
            <div id="ownerNumberVal" class="display-val">--</div>
            <input type="number" id="ownerNumberInput" placeholder="Owner Only">
            <button class="btn-write" onclick="updateData('setOwnerNumber', 'ownerNumberInput')" disabled>Update</button>
        </div>
        <div class="item-card" id="card-OwnerText">
            <div class="label">OWNER TEXT</div>
            <div id="ownerTextVal" class="display-val">--</div>
            <input type="text" id="ownerTextInput" placeholder="Owner Only">
            <button class="btn-write" onclick="updateData('setOwnerText', 'ownerTextInput')" disabled>Update</button>
        </div>
    </div>

    <div id="log">>> Ready for interaction.</div>
</div>

<script>
    const contractAddress = "0x7212dD5F5a2062a412dc3441A1571A2c335CD7fF";
    const contractABI = [{"anonymous":false,"inputs":[{"indexed":false,"internalType":"uint256","name":"num","type":"uint256"}],"name":"AnyNumberChanged","type":"event"},{"anonymous":false,"inputs":[{"indexed":false,"internalType":"string","name":"text","type":"string"}],"name":"AnyTextChanged","type":"event"},{"anonymous":false,"inputs":[{"indexed":false,"internalType":"uint256","name":"num","type":"uint256"}],"name":"OwnerNumberChanged","type":"event"},{"anonymous":false,"inputs":[{"indexed":false,"internalType":"string","name":"text","type":"string"}],"name":"OwnerTextChanged","type":"event"},{"inputs":[],"name":"anyNumber","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"anyText","outputs":[{"internalType":"string","name":"","type":"string"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"owner","outputs":[{"internalType":"address","name":"","type":"address"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"ownerNumber","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"ownerText","outputs":[{"internalType":"string","name":"","type":"string"}],"stateMutability":"view","type":"function"},{"inputs":[{"internalType":"uint256","name":"_num","type":"uint256"}],"name":"setAnyNumber","outputs":[],"stateMutability":"nonpayable","type":"function"},{"inputs":[{"internalType":"string","name":"_text","type":"string"}],"name":"setAnyText","outputs":[],"stateMutability":"nonpayable","type":"function"},{"inputs":[{"internalType":"uint256","name":"_num","type":"uint256"}],"name":"setOwnerNumber","outputs":[],"stateMutability":"nonpayable","type":"function"},{"inputs":[{"internalType":"string","name":"_text","type":"string"}],"name":"setOwnerText","outputs":[],"stateMutability":"nonpayable","type":"function"}];

    let web3, contract, userAccount;

    async function init() {
        if (typeof window.ethereum !== 'undefined') {
            web3 = new Web3(window.ethereum);
            contract = new web3.eth.Contract(contractABI, contractAddress);
            document.getElementById('connectBtn').onclick = async () => {
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                userAccount = accounts[0];
                document.getElementById('walletInfo').innerText = `WALLET: ${userAccount}`;
                document.querySelectorAll('.btn-write').forEach(b => b.disabled = false);
                refreshAll();
                addLog("Wallet connected.", "sys");
            };
        }
    }

    // 完了時のネオン演出
    function triggerNeon(baseName) {
        const card = document.getElementById(`card-${baseName}`);
        if(card) {
            card.classList.remove('card-pending'); // 待機状態を解除
            card.classList.remove('flash-neon');
            void card.offsetWidth; 
            card.classList.add('flash-neon');
        }
    }

    // 更新開始時（Updateボタン押下時）の初期化
    function setCardPending(baseName) {
        const card = document.getElementById(`card-${baseName}`);
        if(card) {
            card.classList.remove('flash-neon');
            card.classList.add('card-pending'); // 黄色い枠の待機状態へ
        }
    }

    async function refreshAll() {
        const res = await Promise.all([
            contract.methods.anyNumber().call(),
            contract.methods.anyText().call(),
            contract.methods.ownerNumber().call(),
            contract.methods.ownerText().call()
        ]);
        document.getElementById('anyNumberVal').innerText = res[0];
        document.getElementById('anyTextVal').innerText = res[1];
        document.getElementById('ownerNumberVal').innerText = res[2];
        document.getElementById('ownerTextVal').innerText = res[3];
    }

    async function updateData(methodName, inputId) {
        const val = document.getElementById(inputId).value;
        if(!val) return;
        
        const baseName = methodName.replace('set', '');
        setCardPending(baseName); // 1. まず待機状態にする

        addLog(`Processing ${methodName}...`, "sys");
        try {
            const receipt = await contract.methods[methodName](val).send({ from: userAccount });
            addLog(`Success! Block: ${receipt.blockNumber}`, "sys");
            refreshAll();
            triggerNeon(baseName); // 2. 完了したらネオンで光らせる
        } catch (e) {
            document.getElementById(`card-${baseName}`).classList.remove('card-pending');
            addLog("Action canceled.", "err");
        }
    }

    function addLog(msg, type) {
        const log = document.getElementById('log');
        const entry = document.createElement('div');
        entry.className = type === "sys" ? "log-sys" : (type === "err" ? "log-err" : "");
        entry.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
        log.insertBefore(entry, log.firstChild);
    }

    init();
</script>
</body>
</html>
