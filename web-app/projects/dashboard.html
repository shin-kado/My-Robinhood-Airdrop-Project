<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web3 Portfolio - Ultimate Edition</title>
    
    <script src="../scripts/tokens.js"></script>
    <script src="../scripts/colors.js"></script>
    <script src="../scripts/accounts.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; display: flex; justify-content: center; padding: 20px; color: #333; }
        .container { width: 100%; max-width: 480px; }
        .card { background: white; padding: 25px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 20px; border-top: 6px solid #00c805; }
        h2 { margin: 0 0 20px 0; color: #00c805; font-size: 1.2em; text-transform: uppercase; letter-spacing: 1px; }
        .info-row { display: flex; justify-content: space-between; padding: 14px 0; border-bottom: 1px solid #f0f0f0; font-size: 1.1em; align-items: center; }
        .label { color: #888; font-weight: 600; font-size: 0.85em; text-transform: uppercase; }
        .val-info { font-family: 'Courier New', monospace; font-weight: bold; color: #111; }
        .val-balance-main { font-weight: 800; font-size: 1.5em; color: #111; display: flex; align-items: center; }
        .token-item { display: flex; justify-content: space-between; align-items: center; padding: 16px; background: #fff; border-radius: 16px; margin-top: 10px; border: 1px solid #f0f0f0; }
        .color-dot { width: 16px; height: 16px; border-radius: 50%; display: inline-block; margin-right: 12px; border: 1px solid rgba(0,0,0,0.08); flex-shrink: 0; }
        .token-left { display: flex; align-items: center; font-weight: bold; font-size: 1.2em; }
        .token-val { font-weight: 800; color: #111; font-size: 1.3em; }
        select, input { width: 100%; padding: 15px; margin-top: 10px; border-radius: 12px; border: 1px solid #ddd; box-sizing: border-box; font-size: 1em; outline: none; }
        
        .btn-send { width: 100%; background: #333; color: white; border: none; padding: 18px; border-radius: 50px; font-weight: bold; margin-top: 20px; cursor: pointer; font-size: 1.1em; transition: 0.2s; }
        .btn-send:disabled { background: #ccc !important; cursor: not-allowed; }
        
        .btn-max { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); background: #00c805; color: white; border: none; padding: 6px 12px; border-radius: 8px; font-size: 0.75em; font-weight: bold; cursor: pointer; }
        .quick-tags { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
        .quick-tags span { font-size: 0.75em; background: #eee; padding: 4px 12px; border-radius: 6px; cursor: pointer; color: #666; font-weight: bold; }
        
        #recipientBadge { margin-top: 10px; font-size: 0.8em; font-weight: bold; padding: 6px 14px; border-radius: 8px; display: none; }
        
        /* エラーメッセージ用スタイル */
        #amountError { font-size: 0.75em; color: #ff4444; font-weight: bold; margin-top: 5px; display: none; }

        .hist-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #f9f9f9; }
        .hist-info { flex: 1.5; display: flex; flex-direction: column; }
        .hist-flow { font-weight: bold; color: #333; font-size: 0.9em; margin-bottom: 2px; }
        .hist-date { font-size: 0.75em; color: #aaa; }
        .hist-net { flex: 1; text-align: center; font-size: 0.7em; color: #888; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        .hist-amt { flex: 1.2; font-weight: 800; color: #00c805; text-align: right; font-size: 0.95em; }

        #toastContainer { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; }
        .toast { background: rgba(0, 0, 0, 0.85); color: white; padding: 12px 24px; border-radius: 50px; margin-top: 10px; font-size: 0.9em; font-weight: bold; text-align: center; min-width: 220px; }
        #chartContainer { position: relative; height: 240px; width: 100%; margin-bottom: 30px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>Asset Overview</h2>
        <div id="chartContainer"><canvas id="assetChart"></canvas></div>
        <div class="info-row"><span class="label">Network</span><span id="netName" class="val-info">Syncing...</span></div>
        <div class="info-row"><span class="label">Address</span><span id="myAddr" class="val-info">-</span></div>
        <div class="info-row" style="border-bottom:none;"><span class="label">Native Balance</span><span id="myBal" class="val-balance-main">-</span></div>
    </div>

    <div class="card">
        <h2>Token Holdings</h2>
        <div id="tokenList"></div>
    </div>

    <div class="card">
        <h2>Quick Transfer</h2>
        <select id="tokenSelector" onchange="checkAmount(); setMax();"><option value="native">Native Currency</option></select>
        
        <div style="position: relative; margin-top: 10px;">
            <input type="text" id="toAddr" placeholder="Recipient Address (0x...)" oninput="updateRecipientDisplay()">
            <div id="recipientBadge"></div>
            <div class="quick-tags" id="accountList"></div>
        </div>
        
        <div style="position: relative; margin-top: 10px;">
            <input type="number" id="amount" placeholder="0.00" oninput="checkAmount()">
            <button class="btn-max" onclick="setMax(); checkAmount();">MAX</button>
        </div>
        <div id="amountError">Insufficient balance (including gas fee)</div>
        
        <button class="btn-send" id="sendBtn" onclick="sendAsset()">Confirm Transfer</button>
    </div>

    <div class="card">
        <h2>History</h2>
        <div id="historyList"></div>
        <button onclick="clearHistory()" style="background:none; border:none; color:#ccc; font-size:0.7em; width:100%; margin-top:15px; cursor:pointer;">Clear History</button>
    </div>
</div>

<div id="toastContainer"></div>

<script>
    let chart;
    let currentBalances = { "native": 0 };
    let currentNativeSymbol = "ETH";
    let currentNetId = 1;

    function showToast(msg, isError = false) {
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerText = msg;
        if(isError) toast.style.background = "#ff4444";
        container.appendChild(toast);
        setTimeout(() => toast.remove(), 4000);
    }

    function getName(addr) {
        if(!addr) return "Unknown";
        const acc = MASTER_ACCOUNT_LIST.find(a => a.address.toLowerCase() === addr.toLowerCase());
        return acc ? acc.name : addr.slice(0,6)+'...'+addr.slice(-4);
    }

    function updateRecipientDisplay() {
        const addr = document.getElementById('toAddr').value.trim().toLowerCase();
        const badge = document.getElementById('recipientBadge');
        if (!addr || addr.length < 10) { badge.style.display = 'none'; return; }
        const acc = MASTER_ACCOUNT_LIST.find(a => a.address.toLowerCase() === addr);
        badge.style.display = 'inline-block';
        if (acc) {
            badge.innerText = `To: ${acc.name} (${addr.slice(0,6)}...${addr.slice(-4)})`;
            badge.style.color = "#00c805"; badge.style.background = "rgba(0,200,5,0.1)";
        } else {
            badge.innerText = "To: Unknown Address";
            badge.style.color = "#ff4444"; badge.style.background = "rgba(255,68,68,0.1)";
        }
    }

    // ★ 本日追加：送金可能額の判定ロジック
    function checkAmount() {
        const target = document.getElementById('tokenSelector').value;
        const inputVal = parseFloat(document.getElementById('amount').value) || 0;
        const btn = document.getElementById('sendBtn');
        const errorMsg = document.getElementById('amountError');
        
        let balance = currentBalances[target] || 0;
        let isInvalid = false;

        if (target === "native") {
            // ネイティブ：保有額 - ガス代 を超えたらダメ
            const netConfig = MASTER_NETWORKS[currentNetId] || { gasFee: 0.005 };
            const limit = Math.max(0, balance - netConfig.gasFee);
            if (inputVal > limit) isInvalid = true;
        } else {
            // トークン：保有額を超えたらダメ
            if (inputVal > balance) isInvalid = true;
        }

        if (isInvalid && inputVal > 0) {
            btn.disabled = true;
            errorMsg.style.display = 'block';
        } else {
            btn.disabled = false;
            errorMsg.style.display = 'none';
        }
    }

    async function sync() {
        if (!window.ethereum) return;
        try {
            const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
            if (accounts.length === 0) return;
            const userAddr = accounts[0];
            const chainIdHex = await window.ethereum.request({ method: 'eth_chainId' });
            currentNetId = parseInt(chainIdHex, 16);

            const netConfig = MASTER_NETWORKS[currentNetId] || { name: "Unknown", symbol: "Native" };
            document.getElementById('netName').innerText = netConfig.name;
            currentNativeSymbol = netConfig.symbol;
            document.getElementById('myAddr').innerText = userAddr.slice(0,6) + "..." + userAddr.slice(-4);

            const balHex = await window.ethereum.request({ method: 'eth_getBalance', params: [userAddr, 'latest'] });
            const nativeVal = Number(BigInt(balHex)) / 1e18;
            currentBalances["native"] = nativeVal;
            
            document.getElementById('myBal').innerHTML = `
                <span class="color-dot" style="background:${COLOR_PALETTE[0]}"></span>
                ${nativeVal.toFixed(4)} <span style="font-size:0.6em; margin-left:8px; color:#999;">${currentNativeSymbol}</span>
            `;

            const tokens = MASTER_TOKEN_LIST[currentNetId] || [];
            const listDiv = document.getElementById('tokenList');
            const selector = document.getElementById('tokenSelector');
            listDiv.innerHTML = "";
            selector.innerHTML = `<option value="native">Native (${currentNativeSymbol})</option>`;

            let labels = [currentNativeSymbol], dataValues = [nativeVal], activeColors = [COLOR_PALETTE[0]], colorIndex = 1;

            for (const t of tokens) {
                const data = "0x70a08231" + userAddr.substring(2).padStart(64, '0');
                const hex = await window.ethereum.request({ method: 'eth_call', params: [{ to: t.a, data: data }, 'latest'] });
                const val = (hex && hex !== '0x') ? Number(BigInt(hex)) / 1e18 : 0;
                currentBalances[t.a] = val;
                
                if (val > 0) {
                    const col = COLOR_PALETTE[colorIndex % COLOR_PALETTE.length];
                    listDiv.innerHTML += `<div class="token-item"><div class="token-left"><span class="color-dot" style="background:${col}"></span>${t.s}</div><span class="token-val">${val.toLocaleString()}</span></div>`;
                    selector.innerHTML += `<option value="${t.a}">${t.s}</option>`;
                    labels.push(t.s); dataValues.push(val); activeColors.push(col); colorIndex++;
                }
            }
            updateChart(labels, dataValues, activeColors);
            generateAccountTags();
            checkAmount(); // 同期後にも判定
        } catch (e) { console.error("Sync Error:", e); }
    }

    function generateAccountTags() {
        document.getElementById('accountList').innerHTML = MASTER_ACCOUNT_LIST.map(acc => `<span onclick="setAddr('${acc.address}')">${acc.name}</span>`).join('');
    }

    function updateChart(labels, data, colors) {
        const ctx = document.getElementById('assetChart').getContext('2d');
        if (chart) chart.destroy();
        chart = new Chart(ctx, {
            type: 'doughnut',
            data: { labels: labels, datasets: [{ data: data, backgroundColor: colors, borderWidth: 4 }] },
            options: { responsive: true, maintainAspectRatio: false, cutout: '82%', plugins: { legend: { display: false } } }
        });
    }

    function setAddr(addr) { 
        document.getElementById('toAddr').value = addr; 
        updateRecipientDisplay();
    }

    function setMax() {
        const target = document.getElementById('tokenSelector').value;
        let val = currentBalances[target] || 0;
        if (target === "native") {
            const netConfig = MASTER_NETWORKS[currentNetId] || { gasFee: 0.005 };
            val = Math.max(0, val - netConfig.gasFee);
        }
        document.getElementById('amount').value = parseFloat(val.toFixed(4));
        checkAmount(); // MAXボタン押下時もチェック
    }

    function displayHistory() {
        const history = JSON.parse(localStorage.getItem('tx_history') || '[]');
        const div = document.getElementById('historyList');
        if (history.length === 0) { div.innerHTML = '<p style="text-align:center;color:#999;font-size:0.8em;">No history yet.</p>'; return; }
        div.innerHTML = history.map(tx => `
            <div class="hist-item">
                <div class="hist-info">
                    <div class="hist-flow">${getName(tx.from)} → ${getName(tx.to)}</div>
                    <div class="hist-date">${tx.date}</div>
                </div>
                <div class="hist-net">${tx.network || 'Unknown'}</div>
                <div class="hist-amt">-${tx.amount} ${tx.symbol}</div>
            </div>`).join('');
    }

    function clearHistory() { if(confirm("Clear history?")) { localStorage.removeItem('tx_history'); displayHistory(); } }

    async function sendAsset() {
        const targetToken = document.getElementById('tokenSelector').value;
        const to = document.getElementById('toAddr').value;
        const amt = document.getElementById('amount').value;
        const btn = document.getElementById('sendBtn');
        if (!to || !amt) return showToast("Enter address and amount", true);

        try {
            btn.disabled = true;
            btn.innerText = "Processing...";
            const accounts = await window.ethereum.request({ method: 'eth_accounts' });
            const fromAddr = accounts[0];
            let txParams; let symbol = currentNativeSymbol;

            if (targetToken === "native") {
                txParams = { from: fromAddr, to: to, value: "0x" + (BigInt(Math.floor(amt * 1e9)) * 10n**9n).toString(16) };
            } else {
                const amountWei = (BigInt(Math.floor(amt * 1e6)) * (10n ** 12n)).toString(16).padStart(64, '0');
                txParams = { from: fromAddr, to: targetToken, data: "0xa9059cbb" + to.substring(2).padStart(64, '0') + amountWei };
                const tInfo = MASTER_TOKEN_LIST[currentNetId]?.find(t => t.a.toLowerCase() === targetToken.toLowerCase());
                symbol = tInfo ? tInfo.s : "Token";
            }

            const txHash = await window.ethereum.request({ method: 'eth_sendTransaction', params: [txParams] });
            showToast("Sent! Waiting for confirmation...");

            let receipt = null;
            while (receipt === null) {
                try { receipt = await window.ethereum.request({ method: 'eth_getTransactionReceipt', params: [txHash] }); } catch (e) { }
                if (!receipt) await new Promise(res => setTimeout(res, 2000));
            }

            showToast("Confirmed! Balances updated.");
            const netConfig = MASTER_NETWORKS[currentNetId] || { name: "Unknown" };
            const history = JSON.parse(localStorage.getItem('tx_history') || '[]');
            history.unshift({ from: fromAddr, to: to, date: new Date().toLocaleString(), amount: amt, symbol: symbol, network: netConfig.name });
            localStorage.setItem('tx_history', JSON.stringify(history.slice(0, 10)));
            
            displayHistory(); await sync();
            btn.innerText = "Confirm Transfer";
            document.getElementById('recipientBadge').style.display = 'none';
        } catch (e) {
            console.error(e); showToast(e.message || "Error", true);
            btn.disabled = false; btn.innerText = "Confirm Transfer";
        }
    }

    window.onload = () => { sync(); displayHistory(); };
    if (window.ethereum) {
        window.ethereum.on('chainChanged', () => window.location.reload());
        window.ethereum.on('accountsChanged', () => window.location.reload());
    }
</script>
</body>
</html>
