<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>Admin Panel | Robinhood Swap</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <script src="../scripts/token-rates.js"></script>
    <style>
        body {
            font-family: sans-serif;
            background: #1a1a1a;
            color: white;
            padding: 20px;
        }

        .admin-card {
            background: #2a2a2a;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .token-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px;
            border-bottom: 1px solid #333;
        }

        .token-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .token-icon {
            width: 30px;
            height: 30px;
            border-radius: 50%;
        }

        .btn-action {
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            border: none;
        }

        .btn-withdraw {
            background: #ff4444;
            color: white;
        }

        .hidden {
            display: none;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th,
        td {
            text-align: left;
            padding: 10px;
            border-bottom: 1px solid #333;
            font-size: 0.9em;
        }
    </style>
</head>

<body>

    <h1>Admin Management</h1>

    <div id="authMessage" class="admin-card">Walletを接続してオーナー確認を行ってください...</div>

    <div id="adminPanel" class="hidden">

        <div class="admin-card">
            <h2>Contract Inventory</h2>
            <div id="inventoryList"></div>
        </div>

        <div class="admin-card">
            <h2>Current Swap Rates (Reference)</h2>
            <div id="rateDisplayList"></div>
        </div>

        <div class="admin-card">
            <h2>System Settings</h2>
            <p>Current Signer: <span id="currentSigner">Loading...</span></p>
        </div>

        <div class="admin-card">
            <h2>Global Swap History (On-chain)</h2>
            <table>
                <thead>
                    <tr>
                        <th>User</th>
                        <th>Swap</th>
                        <th>Amount</th>
                        <th>Nonce</th>
                    </tr>
                </thead>
                <tbody id="historyList"></tbody>
            </table>
        </div>
    </div>

    <div style="text-align: center; margin-top: 30px; border-top: 1px solid #333; padding-top: 20px;">
        <h3>System Test</h3>
        <button onclick="runSignerTest()"
            style="padding: 10px 20px; background: #4CAF50; color: white; border: none; border-radius: 8px; cursor: pointer;">
            Render署名サーバー通信テスト実行
        </button>
    </div>

    <!-- admin.html の既存のテストボタンの下に追加 -->
    <div style="text-align: center; margin-top: 10px;">
        <button onclick="executeRealSwapTest()"
            style="padding: 10px 20px; background: #E91E63; color: white; border: none; border-radius: 8px; cursor: pointer;">
            本番スワップ動作テスト実行 (AMD → MRT)
        </button>
    </div>

    <script>
        // --- 署名サーバー設定 ---
        const SIGNER_URL = "https://robinhood-signer.onrender.com";

        const CONTRACT_ADDR = "0x2480Bce6825d3D402a5Fe89948571aeF14f1974A";
        const OWNER_ADDR = "0x0799F37F871E0280f3149Ca7e4868BEef06f749a";
        const ABI = [
            "function getStock(address) view returns (uint256)",
            "function signerAddress() view returns (address)",
            "function getSupportedTokens() view returns (address[])",
            "function withdrawToken(address, uint256)",
            "event Swapped(address indexed user, address fromToken, address toToken, uint256 fromAmount, uint256 toAmount, uint256 nonce)"
        ];

        let provider, signer, contract;

        // --- 動作確認テスト関数 ---
        async function runSignerTest() {
            alert("Renderサーバーへ通信開始...");
            try {
                // 1. テストデータの準備
                const testData = {
                    userAddress: "0x0799F37F871E0280f3149Ca7e4868BEef06f749a", // あなたのアドレス
                    fromToken: "0x71178BAc73cBeb415514eB542a8995b82669778d", // AMD
                    toToken: "0x196eCa072F41571233E4F6D215F89A3446DD569b",   // MRT
                    fromAmount: ethers.parseUnits("10", 18).toString(),
                    nonce: Date.now()
                };

                // 2. RenderサーバーへFetch（'response' の重複定義を避けるため一度だけ宣言）
                const response = await fetch(`${SIGNER_URL}/get-signature`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(testData)
                });

                const result = await response.json();

                if (result.signature) {
                    console.log("✅ サーバー接続成功！署名:", result.signature);
                    alert("成功！署名を取得しました:\n" + result.signature);
                } else {
                    console.error("❌ サーバーエラー:", result.error);
                    alert("サーバーがエラーを返しました: " + result.error);
                }
            } catch (err) {
                console.error("ネットワークエラー:", err);
                alert("Renderサーバーに繋がらないか、CORSエラーが発生しています。");
            }
        }


        // --- 本物のスワップ実行テスト ---
        async function executeRealSwapTest() {
            try {
                const provider = new ethers.BrowserProvider(window.ethereum);
                const signer = await provider.getSigner();
                const userAddress = await signer.getAddress();

                // 1. コントラクトの設定
                const contractAddress = "0x2480Bce6825d3D402a5Fe89948571aeF14f1974A";
                const abi = [
                    "function swap(address _fromToken, address _toToken, uint256 _fromAmount, uint256 _toAmount, uint256 _nonce, bytes calldata _signature) external",
                    "function nonces(address) public view returns (uint256)",
                    "function isSupported(address) public view returns (bool)"
                ];
                const swapContract = new ethers.Contract(contractAddress, abi, signer);

                // 2. テスト用データ設定 (AMD -> MRT の例)
                const fromToken = "0x71178BAc73cBeb415514eB542a8995b82669778d"; // AMD
                const toToken = "0x196eCa072F41571233E4F6D215F89A3446DD569b";   // MRT
                const fromAmount = ethers.parseUnits("1.0", 18); // 1枚売る
                const currentNonce = await swapContract.nonces(userAddress); // 最新のNonceを取得

                console.log("1. Renderサーバーに署名を依頼中...");

                // 3. Renderサーバーから署名とtoAmountを取得
                const response = await fetch(`${SIGNER_URL}/get-signature`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        userAddress,
                        fromToken,
                        toToken,
                        fromAmount: fromAmount.toString(),
                        nonce: currentNonce.toString()
                    })
                });

                const { toAmount, signature, error } = await response.json();
                if (error) throw new Error(error);

                console.log("2. 署名取得成功。コントラクト実行準備中...");

                // 4. コントラクトのスワップ関数を呼び出す
                // ※事前にトークンの「Approve」が済んでいる必要があります
                const tx = await swapContract.swap(
                    fromToken,
                    toToken,
                    fromAmount,
                    toAmount,
                    currentNonce,
                    signature
                );

                console.log("3. トランザクション送信完了！ハッシュ:", tx.hash);
                alert("スワップ送信完了！反映をお待ちください。\nHash: " + tx.hash);

                await tx.wait();
                alert("✅ スワップが完全に完了しました！");

            } catch (err) {
                console.error("エラー:", err);
                alert("テスト失敗: " + err.message);
            }
        }

        // --- 初期化処理 ---
        async function init() {
            if (!window.ethereum) return;
            provider = new ethers.BrowserProvider(window.ethereum);
            const accounts = await provider.send("eth_requestAccounts", []);

            // 現在の接続アドレスを小文字化して取得[cite: 4]
            const userAddr = accounts[0].toLowerCase();

            // オーナーチェック：OWNER_ADDRも小文字化して比較することで不一致を防止
            if (userAddr === OWNER_ADDR.toLowerCase()) {
                document.getElementById('authMessage').classList.add('hidden');
                document.getElementById('adminPanel').classList.remove('hidden');
                setupAdmin();
            } else {
                document.getElementById('authMessage').innerText = "アクセス拒否: オーナーではありません。";
            }
        }

        async function setupAdmin() {
            signer = await provider.getSigner();
            contract = new ethers.Contract(CONTRACT_ADDR, ABI, signer);

            loadInventory();
            loadGlobalHistory();

            const currentSigner = await contract.signerAddress();
            document.getElementById('currentSigner').innerText = shortenAddr(currentSigner);
        }

        async function loadInventory() {
            const tokens = await contract.getSupportedTokens();
            const listDiv = document.getElementById('inventoryList');
            const rateDiv = document.getElementById('rateDisplayList'); // レート表示エリアを取得[cite: 4]
            listDiv.innerHTML = "";
            rateDiv.innerHTML = ""; // 初期化[cite: 4]

            const netData = TOKEN_USD_RATES["46630"].tokens;
            const lookup = {};
            Object.keys(netData).forEach(key => lookup[key.toLowerCase()] = netData[key]);

            for (let addr of tokens) {
                const stock = await contract.getStock(addr);
                const tokenInfo = lookup[addr.toLowerCase()];
                const symbol = tokenInfo?.symbol || "Unknown";
                const rate = tokenInfo?.rate || 0; // レートを取得[cite: 5]

                // --- 1. 在庫リストの更新（補充・回収ボタン付き） ---
                const row = document.createElement('div');
                row.className = 'token-row';
                const stockFormatted = Number(ethers.formatUnits(stock, 18)).toLocaleString(undefined, {
                    minimumFractionDigits: 1,
                    maximumFractionDigits: 4
                });

                row.innerHTML = `
    <div class="token-info" style="display: flex; align-items: center; flex: 1;">
        <!-- シンボル：幅60px固定 -->
        <span style="width: 60px; font-size: 1.25em; font-weight: bold; display: inline-block;">${symbol}</span>
        <!-- アドレス：幅120px固定 -->
        <small style="width: 120px; color: #aaa; margin-left: 10px; display: inline-block;">${shortenAddr(addr)}</small>
    </div>
    
    <div style="display: flex; align-items: center; justify-content: flex-end;">
        <!-- 保有量エリア：ここがポイント -->
        <div style="display: flex; align-items: center; justify-content: flex-end; margin-right: 20px;">
<!-- カンマ区切りにした数値を表示 -->
            <strong style="width: 140px; text-align: right; font-size: 1.5em; font-family: 'Courier New', monospace;">
                ${stockFormatted}
            </strong>
                        <!-- シンボル部分を左寄せ固定幅にする -->
            <span style="width: 70px; margin-left: 8px; font-size: 1.25em; font-weight: bold; text-align: left;">
                ${symbol}
            </span>
        </div>

        <!-- ボタン -->
        <button class="btn-action" onclick="deposit('${addr}', '${symbol}')" 
            style="background: #4CAF50; color: white; cursor:pointer; border:none; padding:5px 10px; border-radius:4px; width: 50px;">
            補充
        </button>
        <button class="btn-action btn-withdraw" onclick="withdraw('${addr}')" 
            style="margin-left:5px; cursor:pointer; border:none; padding:5px 10px; border-radius:4px; width: 50px;">
            回収
        </button>
    </div>
`;
                listDiv.appendChild(row);

                // --- 2. レート一覧の表示を復旧 ---[cite: 4]
                const rateRow = document.createElement('div');
                rateRow.className = 'token-row';
                rateRow.innerHTML = `
            <span>${symbol}</span>
            <span>$ ${rate.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 4 })}</span>
        `;
                rateDiv.appendChild(rateRow);
            }
        }

        // --- 補充（Deposit）関数の追加 ---
        async function deposit(tokenAddress, symbol) {
            try {
                const amountStr = prompt(`${symbol} をいくら補充（送金）しますか？`);
                if (!amountStr || isNaN(amountStr)) return;

                const amount = ethers.parseUnits(amountStr, 18);

                // トークン側のコントラクトを操作するための設定
                const tokenAbi = ["function transfer(address to, uint256 amount) returns (bool)"];
                const tokenContract = new ethers.Contract(tokenAddress, tokenAbi, signer);

                console.log(`${symbol} を ${CONTRACT_ADDR} へ送金中...`);

                // あなたのウォレットから RobinhoodSwap コントラクトへ直接送金
                const tx = await tokenContract.transfer(CONTRACT_ADDR, amount);

                alert(`${symbol} の補充トランザクションを送信しました。反映を待ちます...`);
                await tx.wait();

                alert(`✅ ${symbol} の補充が完了しました！`);
                loadInventory(); // 画面上の在庫表示を更新
            } catch (err) {
                console.error("補充エラー:", err);
                alert("補充に失敗しました: " + err.message);
            }
        }

        // --- コントラクトからトークンを回収（引き出し）する関数 ---
        async function withdraw(tokenAddress) {
            try {
                const amountStr = prompt("回収する数量を入力してください（例: 100）");
                if (!amountStr) return;

                // 入力された値を 18桁（Ether単位）に変換
                const amount = ethers.parseUnits(amountStr, 18);

                console.log(`${tokenAddress} を ${amountStr} 枚回収します...`);

                // スマートコントラクトの withdrawToken 関数を呼び出す
                const tx = await contract.withdrawToken(tokenAddress, amount);

                alert("トランザクションを送信しました。反映を待っています...");
                await tx.wait(); // 完了を待機

                alert("✅ 回収が完了しました！");
                loadInventory(); // 在庫表示を更新
            } catch (err) {
                console.error("回収エラー:", err);
                alert("エラーが発生しました: " + err.message);
            }
        }

        async function loadGlobalHistory() {
            const list = document.getElementById('historyList');
            if (!list) return;
            list.innerHTML = "<tr><td colspan='4'>履歴を読み込み中...</td></tr>";

            try {
                const filter = contract.filters.Swapped();
                const events = await contract.queryFilter(filter, 0, "latest");

                if (events.length === 0) {
                    list.innerHTML = "<tr><td colspan='4'>取引履歴はありません。</td></tr>";
                    return;
                }

                // token-rates.js のデータを取得[cite: 5]
                const tokenData = TOKEN_USD_RATES["46630"].tokens;

                // 照合を確実にするため、tokenDataのキーをすべて小文字にした新しいオブジェクトを作成
                const lookup = {};
                Object.keys(tokenData).forEach(addr => {
                    lookup[addr.toLowerCase()] = tokenData[addr];
                });

                list.innerHTML = events.reverse().map(ev => {
                    const { user, fromToken, toToken, fromAmount, toAmount, nonce } = ev.args;

                    // イベントのアドレスを小文字にして lookup から検索
                    const fromInfo = lookup[fromToken.toLowerCase()];
                    const toInfo = lookup[toToken.toLowerCase()];

                    const fromSym = fromInfo ? fromInfo.symbol : "???";
                    const toSym = toInfo ? toInfo.symbol : "???";

                    // loadGlobalHistory 関数の map 処理内を修正
                    const fromAmtFormatted = Number(ethers.formatUnits(fromAmount, 18)).toLocaleString(undefined, { minimumFractionDigits: 1 });
                    const toAmtFormatted = Number(ethers.formatUnits(toAmount, 18)).toLocaleString(undefined, { minimumFractionDigits: 1 });

                    return `
    <tr>
        <td>${shortenAddr(user)}</td>
        <td>${fromSym} → ${toSym}</td>
        <!-- カンマ区切りで表示 -->
        <td>${fromAmtFormatted} ${fromSym} → ${toAmtFormatted} ${toSym}</td>
        <td>#${nonce}</td>
    </tr>
`;
                }).join('');
            } catch (err) {
                console.error("履歴取得エラー:", err);
                list.innerHTML = "<tr><td colspan='4'>履歴の取得に失敗しました。</td></tr>";
            }
        }

        function shortenAddr(addr) {
            return addr.substring(0, 5) + "..." + addr.substring(addr.length - 5);
        }

        window.onload = init;
    </script>
</body>

</html>
